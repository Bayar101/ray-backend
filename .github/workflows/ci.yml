name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26" # match go.mod (go 1.26.4)
      - run: go vet ./...
      - run: make test # unit
      - run: make test-integration # integration (Docker is on the runner)
